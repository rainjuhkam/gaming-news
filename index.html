<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gaming News</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { color-scheme: dark; }
        body { margin: 0; background: #000; color: #e5e5e7; font-family: -apple-system, sans-serif; overflow-x: hidden; }

        /* Fixed Stealth Header */
        header { 
            position: fixed; top: 0; left: 0; right: 0;
            height: calc(45px + env(safe-area-inset-top));
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: flex; align-items: flex-end; justify-content: space-between;
            padding: 0 20px 12px; z-index: 1000; border-bottom: 1px solid #1c1c1e;
        }

        .app-title { font-family: 'Press Start 2P', cursive; font-size: 10px; color: #fff; text-transform: uppercase; margin: 0; }
        .bed-mode-toggle { font-size: 20px; cursor: pointer; }

        #feed-container { padding-top: calc(70px + env(safe-area-inset-top)); }

        .card { margin-bottom: 20px; cursor: pointer; border-bottom: 1px solid #1c1c1e; padding-bottom: 16px; }
        .thumb-wrapper { width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #111; }
        .parallax-thumb { width: 100%; height: 100%; object-fit: cover; }

        .content { padding: 12px 16px; }
        .title { font-size: 16px; font-weight: 600; color: #fff; line-height: 1.3; }
        .meta { font-size: 11px; color: #888; margin-top: 8px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }

        #reader { display: none; padding: calc(20px + env(safe-area-inset-top)) 16px 150px; min-height: 100vh; background: #000; position: relative; z-index: 2000; }
        .articlePage h2 { font-size: 22px; color: #fff; line-height: 1.2; margin-bottom: 20px; }
        .articlePage p { font-size: 19px; line-height: 1.6; color: #ccc; margin-bottom: 1.2em; }
        .articlePage img { width: 100%; border-radius: 8px; margin: 10px 0; }

        .button {
            position: fixed; left: 20px; right: 20px; padding: 18px; font-size: 16px; 
            border-radius: 14px; background: #1c1c1e; color: #fff; font-weight: 600; text-align: center; border: 1px solid #333;
        }
        #openSafari { bottom: calc(20px + env(safe-area-inset-bottom) + 75px); background: #0a84ff; border: none; }
        #backBtn { bottom: calc(20px + env(safe-area-inset-bottom) + 10px); }

        .bed-active { opacity: 0.35; filter: sepia(0.2) contrast(0.9); }
        .loading { text-align: center; padding: 100px 20px; font-family: 'Press Start 2P'; font-size: 8px; line-height: 2; }
    </style>
</head>
<body>

<header id="mainHeader">
    <div class="app-title">Gaming News</div>
    <div class="bed-mode-toggle" id="bedBtn" onclick="toggleBed()">🌙</div>
</header>

<div id="feed-container">
    <div id="status" class="loading">SYNCING FEEDS...</div>
    <div id="feed"></div>
</div>

<div id="reader">
    <div class="articlePage" id="articleContent"></div>
    <button class="button" id="openSafari" onclick="openSafari()">Open in Safari</button>
    <button class="button" id="backBtn" onclick="back()">⬅︎ Back to Feed</button>
</div>

<script>
const feeds = [
    { url: "https://www.videogameschronicle.com/feed/", name: "VGC" },
    { url: "https://aftermath.site/feed", name: "Aftermath" },
    { url: "https://www.pcgamer.com/rss/", name: "PC Gamer" },
    { url: "https://www.eurogamer.net/feed", name: "Eurogamer" },
    { url: "https://kotaku.com/rss", name: "Kotaku" },
    { url: "https://www.polygon.com/rss/index.xml", name: "Polygon" },
    { url: "https://www.gamespot.com/feeds/mashup/", name: "GameSpot" },
    { url: "https://www.gamesindustry.biz/feed", name: "GamesIndustry" },
    { url: "https://www.rockpapershotgun.com/feed", name: "RPS" }
];

let allArticles = [];
let currentIndex = null;
let scrollPos = 0;

// Use a faster, more reliable proxy
const proxy = "https://corsproxy.io/?";

function formatTime(date) {
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function fetchAll() {
    const fetchPromises = feeds.map(async (f) => {
        try {
            const response = await fetch(proxy + encodeURIComponent(f.url));
            if (!response.ok) throw new Error();
            const text = await response.text();
            const xml = new DOMParser().parseFromString(text, "text/xml");
            
            // Handle both RSS (<item>) and Atom (<entry>)
            const entries = xml.querySelectorAll("item, entry");
            
            entries.forEach(el => {
                const title = el.querySelector("title")?.textContent || "";
                const link = el.querySelector("link")?.getAttribute("href") || el.querySelector("link")?.textContent || "";
                const dateStr = el.querySelector("pubDate, published, updated")?.textContent;
                const date = new Date(dateStr || 0);
                
                // Only last 4 days
                if (Date.now() - date.getTime() < 4 * 24 * 60 * 60 * 1000) {
                    const desc = el.querySelector("description, content, summary")?.textContent || "";
                    
                    // Improved image extraction
                    let img = el.querySelector("enclosure")?.getAttribute("url") || 
                              el.querySelector("content\\:encoded")?.textContent?.match(/<img[^>]+src="([^">]+)"/)?.[1] ||
                              desc.match(/<img[^>]+src="([^">]+)"/)?.[1] || null;

                    allArticles.push({ title, link, date, source: f.name, image: img, content: desc });
                }
            });
        } catch (e) {
            console.warn(`Failed: ${f.name}`);
        }
    });

    await Promise.all(fetchPromises);
    allArticles.sort((a, b) => b.date - a.date);
    
    if (allArticles.length === 0) {
        document.getElementById("status").innerText = "ERROR: NO DATA FETCHED.\nRETRYING IN 5S...";
        setTimeout(fetchAll, 5000);
        return;
    }

    document.getElementById("status").style.display = "none";
    render();
}

function render() {
    const container = document.getElementById("feed");
    container.innerHTML = "";
    allArticles.forEach((a, i) => {
        const card = document.createElement("div");
        card.className = "card";
        const img = a.image ? `<div class="thumb-wrapper"><img src="${a.image}" class="parallax-thumb" loading="lazy"></div>` : "";
        card.innerHTML = `${img}<div class="content"><div class="title">${a.title}</div><div class="meta">${a.source} • ${formatTime(a.date)}</div></div>`;
        card.onclick = () => openArticle(i);
        container.appendChild(card);
    });
}

function openArticle(i) {
    currentIndex = i;
    scrollPos = window.scrollY;
    const a = allArticles[i];
    document.getElementById("mainHeader").style.display = "none";
    document.getElementById("feed-container").style.display = "none";
    document.getElementById("reader").style.display = "block";
    
    // Clean content and fix images
    let clean = a.content.replace(/<img/g, '<img loading="lazy"');
    document.getElementById("articleContent").innerHTML = `<h2>${a.title}</h2>` + clean;
    window.scrollTo(0, 0);
}

function back() {
    document.getElementById("reader").style.display = "none";
    document.getElementById("mainHeader").style.display = "flex";
    document.getElementById("feed-container").style.display = "block";
    window.scrollTo(0, scrollPos);
}

function openSafari() { window.open(allArticles[currentIndex].link, '_blank'); }

function toggleBed() {
    document.body.classList.toggle('bed-active');
    document.getElementById('bedBtn').innerText = document.body.classList.contains('bed-active') ? "☀️" : "🌙";
}

// Simple Swipe Back
let startX = 0;
document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
document.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientX - startX > 100 && document.getElementById("reader").style.display === "block") back();
});

fetchAll();
</script>
</body>
</html>

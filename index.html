<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/686/686589.png">
    <title>Gaming News</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { color-scheme: dark; }
        body { margin: 0; background: #000; color: #e5e5e7; font-family: -apple-system, sans-serif; overflow-x: hidden; }

        /* Fixed Stealth Header */
        header { 
            position: fixed; top: 0; left: 0; right: 0;
            height: calc(45px + env(safe-area-inset-top));
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: flex; align-items: flex-end; justify-content: space-between;
            padding: 0 20px 12px; z-index: 1000; border-bottom: 1px solid #1c1c1e;
        }

        .app-title { font-family: 'Press Start 2P', cursive; font-size: 10px; color: #fff; text-transform: uppercase; margin: 0; }
        .bed-mode-toggle { font-size: 20px; cursor: pointer; }

        /* Pull to Refresh Indicator */
        #ptr { 
            height: 0; overflow: hidden; text-align: center; 
            background: #111; color: #888; font-family: 'Press Start 2P', cursive; 
            font-size: 8px; line-height: 1.5; display: flex; align-items: center; justify-content: center;
            transition: height 0.2s ease;
            margin-top: calc(45px + env(safe-area-inset-top)); /* Offset behind header */
        }

        #feed-container { padding-top: 20px; padding-bottom: calc(40px + env(safe-area-inset-bottom)); }

        /* Cards & Parallax */
        .card { margin-bottom: 24px; border-bottom: 1px solid #1c1c1e; padding-bottom: 16px; }
        .thumb-wrapper { width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #111; cursor: pointer; }
        .parallax-thumb { width: 100%; height: 100%; object-fit: cover; transform: scale(1.15); will-change: transform; pointer-events: none; }

        .content { padding: 12px 16px; }
        .title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .title { font-size: 16px; font-weight: 600; color: #fff; line-height: 1.3; cursor: pointer; flex-grow: 1; }
        
        /* Accordion Toggle */
        .expand-btn { 
            background: #1c1c1e; border: 1px solid #333; border-radius: 50%; 
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; 
            font-size: 12px; color: #fff; cursor: pointer; flex-shrink: 0;
            transition: transform 0.3s ease, background 0.2s;
        }
        .expand-btn.open { transform: rotate(180deg); background: #333; }

        .meta { font-size: 11px; color: #888; margin-top: 8px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }

        /* Hidden Description */
        .desc-container { 
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease, margin-top 0.4s ease;
            font-size: 15px; line-height: 1.6; color: #ccc;
        }
        .desc-container.open { max-height: 1000px; margin-top: 16px; }
        .desc-container img { max-width: 100%; height: auto; border-radius: 8px; margin: 10px 0; display: block; }
        .desc-container a { color: #0a84ff; text-decoration: none; }

        .bed-active { opacity: 0.35; filter: sepia(0.2) contrast(0.9); }
        .loading { text-align: center; padding: 100px 20px; font-family: 'Press Start 2P'; font-size: 8px; line-height: 2; color: #888; }
    </style>
</head>
<body>

<header id="mainHeader">
    <div class="app-title">Gaming News</div>
    <div class="bed-mode-toggle" id="bedBtn" onclick="toggleBed()">🌙</div>
</header>

<div id="ptr">PULL TO REFRESH</div>

<div id="feed-container">
    <div id="status" class="loading">SYNCING FEEDS...</div>
    <div id="feed"></div>
</div>

<script>
const feeds = [
    { url: "https://www.videogameschronicle.com/feed/", name: "VGC" },
    { url: "https://aftermath.site/feed", name: "Aftermath" },
    { url: "https://www.pcgamer.com/rss/", name: "PC Gamer" },
    { url: "https://www.eurogamer.net/feed", name: "Eurogamer" },
    { url: "https://kotaku.com/rss", name: "Kotaku" },
    { url: "https://www.polygon.com/rss/index.xml", name: "Polygon" },
    { url: "https://www.gamespot.com/feeds/mashup/", name: "GameSpot" },
    { url: "https://www.gamesindustry.biz/feed", name: "GamesIndustry" },
    { url: "https://www.rockpapershotgun.com/feed", name: "RPS" }
];

let allArticles = [];
let ticking = false;
const proxy = "https://corsproxy.io/?";

function formatTime(date) {
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function fetchAll(isRefresh = false) {
    if (!isRefresh) document.getElementById("status").style.display = "block";
    allArticles = []; // Clear current feed

    const fetchPromises = feeds.map(async (f) => {
        try {
            const response = await fetch(proxy + encodeURIComponent(f.url), { cache: "no-store" });
            if (!response.ok) throw new Error();
            const text = await response.text();
            const xml = new DOMParser().parseFromString(text, "text/xml");
            
            const entries = xml.querySelectorAll("item, entry");
            
            entries.forEach(el => {
                const title = el.querySelector("title")?.textContent || "";
                const link = el.querySelector("link")?.getAttribute("href") || el.querySelector("link")?.textContent || "";
                const dateStr = el.querySelector("pubDate, published, updated")?.textContent;
                const date = new Date(dateStr || 0);
                
                if (Date.now() - date.getTime() < 4 * 24 * 60 * 60 * 1000) {
                    const desc = el.querySelector("description, summary")?.textContent || "";
                    
                    // Brute-force image extraction for GameSpot/Aftermath
                    const rawStr = new XMLSerializer().serializeToString(el);
                    let imgMatch = rawStr.match(/<media:content[^>]+url=["']([^"']+)["']/i) ||
                                   rawStr.match(/<media:thumbnail[^>]+url=["']([^"']+)["']/i) ||
                                   rawStr.match(/<enclosure[^>]+url=["']([^"']+)["']/i) ||
                                   rawStr.match(/<img[^>]+src=["']([^"']+)["']/i);
                                   
                    let img = imgMatch ? imgMatch[1] : null;

                    allArticles.push({ title, link, date, source: f.name, image: img, content: desc });
                }
            });
        } catch (e) { console.warn(`Failed: ${f.name}`); }
    });

    await Promise.all(fetchPromises);
    allArticles.sort((a, b) => b.date - a.date);
    
    if (allArticles.length === 0) {
        document.getElementById("status").innerText = "ERROR FETCHING.\nPULL DOWN TO RETRY.";
        return;
    }

    document.getElementById("status").style.display = "none";
    render();
}

function render() {
    const container = document.getElementById("feed");
    container.innerHTML = "";
    
    allArticles.forEach((a, i) => {
        const card = document.createElement("div");
        card.className = "card";
        
        // Sanitize Description (Strip nasty iframes or script tags)
        let cleanDesc = a.content.replace(/<script[^>]*>([\S\s]*?)<\/script>/gmi, '')
                                 .replace(/<iframe[^>]*>([\S\s]*?)<\/iframe>/gmi, '');

        const imgHtml = a.image ? `<div class="thumb-wrapper" onclick="window.open('${a.link}', '_blank')"><img src="${a.image}" class="parallax-thumb" loading="lazy" onerror="this.parentElement.style.display='none'"></div>` : "";
        
        card.innerHTML = `
            ${imgHtml}
            <div class="content">
                <div class="title-row">
                    <div class="title" onclick="window.open('${a.link}', '_blank')">${a.title}</div>
                    <div class="expand-btn" onclick="toggleDesc(this)">▼</div>
                </div>
                <div class="meta">${a.source} • ${formatTime(a.date)}</div>
                <div class="desc-container">${cleanDesc}</div>
            </div>
        `;
        container.appendChild(card);
    });
    
    updateParallax();
}

function toggleDesc(btn) {
    btn.classList.toggle("open");
    const desc = btn.parentElement.nextElementSibling.nextElementSibling;
    desc.classList.toggle("open");
    // Trigger parallax recalculation as layout shifts
    setTimeout(updateParallax, 400); 
}

function toggleBed() {
    document.body.classList.toggle('bed-active');
    document.getElementById('bedBtn').innerText = document.body.classList.contains('bed-active') ? "☀️" : "🌙";
}

// --- Parallax Logic ---
function updateParallax() {
    const windowHeight = window.innerHeight;
    const thumbs = document.querySelectorAll('.parallax-thumb');
    thumbs.forEach(thumb => {
        const rect = thumb.parentElement.getBoundingClientRect();
        if (rect.top <= windowHeight && rect.bottom >= 0) {
            const scrollPercent = (windowHeight - rect.top) / (windowHeight + rect.height);
            const yOffset = (scrollPercent - 0.5) * 30; 
            thumb.style.transform = `scale(1.15) translateY(${yOffset}px)`;
        }
    });
}

window.addEventListener('scroll', () => {
    if (!ticking) {
        window.requestAnimationFrame(() => { updateParallax(); ticking = false; });
        ticking = true;
    }
}, { passive: true });

// --- Pull to Refresh Logic ---
let startY = 0;
const ptr = document.getElementById("ptr");

document.addEventListener('touchstart', e => {
    if (window.scrollY <= 0) startY = e.touches[0].clientY;
}, {passive: true});

document.addEventListener('touchmove', e => {
    if (startY > 0 && window.scrollY <= 0) {
        let dy = e.touches[0].clientY - startY;
        if (dy > 0) {
            ptr.style.transition = 'none';
            ptr.style.height = Math.min(dy * 0.5, 80) + 'px';
            ptr.innerText = dy > 120 ? "RELEASE TO REFRESH" : "PULL TO REFRESH";
        }
    }
}, {passive: true});

document.addEventListener('touchend', e => {
    if (startY > 0) {
        let dy = e.changedTouches[0].clientY - startY;
        ptr.style.transition = 'height 0.3s ease';
        if (dy > 120) {
            ptr.style.height = '40px';
            ptr.innerText = "REFRESHING...";
            fetchAll(true).then(() => { ptr.style.height = '0'; });
        } else {
            ptr.style.height = '0';
        }
    }
    startY = 0;
}, {passive: true});

// Init
fetchAll();
</script>
</body>
</html>

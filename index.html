<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/686/686589.png">
    <title>Gaming News</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { color-scheme: dark; }
        body { margin: 0; background: #000; color: #e5e5e7; font-family: -apple-system, sans-serif; overflow-x: hidden; }

        /* Slimmer Fixed Header */
        header { 
            position: fixed; top: 0; left: 0; right: 0;
            /* Slim padding: just enough to clear the notch/status bar + a tiny 12px gap */
            padding: calc(12px + env(safe-area-inset-top)) 20px 12px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: space-between;
            z-index: 1000; border-bottom: 1px solid #1c1c1e;
        }

        .app-title { 
            font-family: 'Press Start 2P', cursive; font-size: 10px; color: #fff; 
            text-transform: uppercase; margin: 0; transition: color 0.3s ease;
            line-height: 1;
        }
        
        .bed-mode-toggle { 
            cursor: pointer; user-select: none; 
            display: flex; align-items: center; justify-content: center;
            transition: color 0.3s ease; color: #888; 
        }
        
        .lucide { width: 12px; height: 12px; stroke-width: 2.5px; }

        .bed-active-ui .app-title { color: #444; } 
        .bed-active-ui .bed-mode-toggle { color: #444; } 

        /* Adjusted Pull to Refresh offset for the slimmer header */
        #ptr { 
            height: 0; overflow: hidden; text-align: center; 
            background: #111; color: #888; font-family: 'Press Start 2P', cursive; 
            font-size: 8px; line-height: 1.5; display: flex; align-items: center; justify-content: center;
            transition: height 0.2s ease;
            margin-top: calc(36px + env(safe-area-inset-top)); 
        }

        /* Adjusted Feed Container to tuck perfectly under the slimmer header */
        #feed-container { 
            padding-top: calc(48px + env(safe-area-inset-top)); 
            padding-bottom: calc(60px + env(safe-area-inset-bottom)); 
            transition: opacity 0.3s ease, filter 0.3s ease;
        }
        #feed-container.bed-active { opacity: 0.35; filter: sepia(0.2) contrast(0.9); }

        .card { margin-bottom: 24px; border-bottom: 1px solid #1c1c1e; padding-bottom: 16px; }
        .thumb-wrapper { width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #111; cursor: pointer; }
        .parallax-thumb { width: 100%; height: 100%; object-fit: cover; transform: scale(1.15); will-change: transform; pointer-events: none; }

        .content { padding: 12px 16px; }
        .title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .title { font-size: 16px; font-weight: 600; color: #fff; line-height: 1.3; cursor: pointer; flex-grow: 1; }
        
        .expand-btn { 
            background: #1c1c1e; border: 1px solid #333; border-radius: 50%; 
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; 
            font-size: 12px; color: #fff; cursor: pointer; flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .expand-btn.open { transform: rotate(180deg); }

        .meta { font-size: 11px; color: #888; margin-top: 8px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }

        .desc-container { 
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease, margin-top 0.4s ease;
            font-size: 15px; line-height: 1.6; color: #ccc;
        }
        .desc-container.open { max-height: 2000px; margin-top: 16px; }

        #scrollTop {
            position: fixed; bottom: calc(30px + env(safe-area-inset-bottom)); right: 20px;
            width: 44px; height: 44px; background: rgba(28, 28, 30, 0.8);
            border: 1px solid #333; border-radius: 50%; color: #fff;
            display: flex; align-items: center; justify-content: center;
            z-index: 1001; opacity: 0; visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s; backdrop-filter: blur(5px);
        }
        #scrollTop.visible { opacity: 1; visibility: visible; }
        #scrollTop .lucide { width: 20px; height: 20px; } 

        .loading { text-align: center; padding: 100px 20px; font-family: 'Press Start 2P'; font-size: 8px; line-height: 2; color: #888; }
    </style>
</head>
<body id="mainBody">

<header id="mainHeader">
    <div class="app-title" id="logo">Gaming News</div>
    <div class="bed-mode-toggle" id="bedBtn" onclick="toggleBed()" aria-label="Toggle Bed Mode">
        <i data-lucide="moon"></i>
    </div>
</header>

<div id="ptr">PULL TO REFRESH</div>

<div id="feed-container">
    <div id="status" class="loading">SYNCING FEEDS...</div>
    <div id="feed"></div>
</div>

<button id="scrollTop" onclick="scrollToTop()" aria-label="Scroll to Top">
    <i data-lucide="chevron-up"></i>
</button>

<script>
const feeds = [
    { url: "https://www.videogameschronicle.com/feed/", name: "VGC" },
    { url: "https://aftermath.site/feed", name: "Aftermath" },
    { url: "https://www.pcgamer.com/rss/", name: "PC Gamer" },
    { url: "https://www.eurogamer.net/feed", name: "Eurogamer" },
    { url: "https://kotaku.com/rss", name: "Kotaku" },
    { url: "https://www.polygon.com/rss/index.xml", name: "Polygon" },
    { url: "https://www.gamespot.com/feeds/mashup/", name: "GameSpot" },
    { url: "https://www.gamesindustry.biz/feed", name: "GamesIndustry" },
    { url: "https://www.rockpapershotgun.com/feed", name: "RPS" }
];

let allArticles = [];
let ticking = false;
const proxy = "https://corsproxy.io/?";

function formatTime(date) {
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function fetchAll(isRefresh = false) {
    if (!isRefresh) document.getElementById("status").style.display = "block";
    allArticles = []; 

    const fetchPromises = feeds.map(async (f) => {
        try {
            const response = await fetch(proxy + encodeURIComponent(f.url), { cache: "no-store" });
            const text = await response.text();
            const xml = new DOMParser().parseFromString(text, "text/xml");
            const entries = xml.querySelectorAll("item, entry");
            
            entries.forEach(el => {
                const title = el.querySelector("title")?.textContent || "";
                const link = el.querySelector("link")?.getAttribute("href") || el.querySelector("link")?.textContent || "";
                const date = new Date(el.querySelector("pubDate, published, updated")?.textContent || 0);
                
                if (Date.now() - date.getTime() < 4 * 24 * 60 * 60 * 1000) {
                    const desc = el.querySelector("description, summary")?.textContent || "";
                    const rawStr = new XMLSerializer().serializeToString(el);
                    let imgMatch = rawStr.match(/<media:content[^>]+url=["']([^"']+)["']/i) ||
                                   rawStr.match(/<enclosure[^>]+url=["']([^"']+)["']/i) ||
                                   rawStr.match(/<img[^>]+src=["']([^"']+)["']/i);
                    let img = imgMatch ? imgMatch[1] : null;
                    allArticles.push({ title, link, date, source: f.name, image: img, content: desc });
                }
            });
        } catch (e) { console.warn(`Failed: ${f.name}`); }
    });

    await Promise.all(fetchPromises);
    allArticles.sort((a, b) => b.date - a.date);
    document.getElementById("status").style.display = "none";
    render();
}

function render() {
    const container = document.getElementById("feed");
    container.innerHTML = "";
    allArticles.forEach((a) => {
        const card = document.createElement("div");
        card.className = "card";
        let cleanDesc = a.content.replace(/<script[^>]*>([\S\s]*?)<\/script>/gmi, '')
                                 .replace(/<iframe[^>]*>([\S\s]*?)<\/iframe>/gmi, '')
                                 .replace(/<img[^>]*>/gmi, '');

        // Removed loading="lazy" for immediate loading and smoother parallax
        const imgHtml = a.image ? `<div class="thumb-wrapper" onclick="window.open('${a.link}', '_blank')"><img src="${a.image}" class="parallax-thumb" onerror="this.parentElement.style.display='none'"></div>` : "";
        card.innerHTML = `${imgHtml}<div class="content"><div class="title-row"><div class="title" onclick="window.open('${a.link}', '_blank')">${a.title}</div><div class="expand-btn" onclick="toggleDesc(this)">▼</div></div><div class="meta">${a.source} • ${formatTime(a.date)}</div><div class="desc-container">${cleanDesc}</div></div>`;
        container.appendChild(card);
    });
    updateParallax();
}

function toggleDesc(btn) {
    btn.classList.toggle("open");
    const desc = btn.parentElement.nextElementSibling.nextElementSibling;
    desc.classList.toggle("open");
    setTimeout(updateParallax, 400); 
}

function toggleBed() {
    const feed = document.getElementById('feed-container');
    const body = document.getElementById('mainBody');
    const btnContainer = document.getElementById('bedBtn');
    
    feed.classList.toggle('bed-active');
    body.classList.toggle('bed-active-ui');
    
    if (feed.classList.contains('bed-active')) {
        btnContainer.innerHTML = '<i data-lucide="sun"></i>';
    } else {
        btnContainer.innerHTML = '<i data-lucide="moon"></i>';
    }
    lucide.createIcons();
}

function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateParallax() {
    const windowHeight = window.innerHeight;
    const thumbs = document.querySelectorAll('.parallax-thumb');
    const scrollBtn = document.getElementById('scrollTop');
    
    if (window.scrollY > 500) scrollBtn.classList.add('visible');
    else scrollBtn.classList.remove('visible');

    thumbs.forEach(thumb => {
        const rect = thumb.parentElement.getBoundingClientRect();
        if (rect.top <= windowHeight && rect.bottom >= 0) {
            const scrollPercent = (windowHeight - rect.top) / (windowHeight + rect.height);
            thumb.style.transform = `scale(1.15) translateY(${(scrollPercent - 0.5) * 30}px)`;
        }
    });
}

window.addEventListener('scroll', () => {
    if (!ticking) {
        window.requestAnimationFrame(() => { updateParallax(); ticking = false; });
        ticking = true;
    }
}, { passive: true });

// PTR Logic
let startY = 0;
const ptr = document.getElementById("ptr");
document.addEventListener('touchstart', e => { if (window.scrollY <= 0) startY = e.touches[0].clientY; }, {passive: true});
document.addEventListener('touchmove', e => {
    if (startY > 0 && window.scrollY <= 0) {
        let dy = e.touches[0].clientY - startY;
        if (dy > 0) {
            ptr.style.height = Math.min(dy * 0.5, 80) + 'px';
            ptr.innerText = dy > 120 ? "RELEASE TO REFRESH" : "PULL TO REFRESH";
        }
    }
}, {passive: true});
document.addEventListener('touchend', e => {
    if (startY > 0) {
        let dy = e.changedTouches[0].clientY - startY;
        if (dy > 120) {
            ptr.style.height = '40px'; ptr.innerText = "REFRESHING...";
            fetchAll(true).then(() => { ptr.style.height = '0'; });
        } else ptr.style.height = '0';
    }
    startY = 0;
}, {passive: true});

lucide.createIcons();
fetchAll();
</script>
</body>
</html>

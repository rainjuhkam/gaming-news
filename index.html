<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/686/686589.png">
    <title>Gaming News</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { color-scheme: dark; }
        body { margin: 0; background: #000; color: #e5e5e7; font-family: -apple-system, sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* --- Header Styles --- */
        header { 
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: flex-end;
            z-index: 1000; border-bottom: 1px solid #1c1c1e;
            transition: padding 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px;
        }

        header.at-top { padding: calc(65px + env(safe-area-inset-top)) 20px 65px; }

        .app-title { 
            position: absolute;
            font-family: 'Press Start 2P', cursive; font-size: 5px; color: #fff; 
            text-transform: uppercase; margin: 0; line-height: 1; letter-spacing: 2px;
            transform-origin: center center;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1), color 0.3s ease;
        }

        header.at-top .app-title { left: 50%; transform: translateX(-50%) scale(2.8); }
        header:not(.at-top) .app-title { left: 20px; transform: translateX(0) scale(1.2); }
        
        .bed-mode-toggle { 
            cursor: pointer; padding: 5px; z-index: 1001;
            display: flex; align-items: center; justify-content: center;
            transition: color 0.3s ease; color: #888; 
        }
        
        .lucide { width: 14px; height: 14px; stroke-width: 2.5px; }

        .bed-active-ui .app-title { color: #444; } 
        .bed-active-ui .bed-mode-toggle { color: #444; } 

        /* --- Pull to Refresh --- */
        #ptr { 
            height: 0; overflow: hidden; text-align: center; 
            background: #0a0a0a; color: #888; font-family: 'Press Start 2P', cursive; 
            font-size: 8px; line-height: 1.5; display: flex; align-items: center; justify-content: center;
            transition: height 0.2s ease;
            /* Sets exact clearance for the expanded header to kill the gap */
            margin-top: calc(145px + env(safe-area-inset-top)); 
        }

        /* --- Main Feed --- */
        #feed-container { 
            /* Top padding removed entirely, #ptr margin handles the offset */
            padding-top: 0; 
            padding-bottom: calc(80px + env(safe-area-inset-bottom)); 
            transition: opacity 0.4s ease;
        }
        #feed-container.bed-active { opacity: 0.3; filter: grayscale(0.5); }

        .card { margin-bottom: 30px; border-bottom: 1px solid #1c1c1e; padding-bottom: 20px; }
        
        .thumb-wrapper { 
            width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #0a0a0a; cursor: pointer; 
            position: relative; border-radius: 4px;
            box-shadow: inset 0 -50px 40px -20px rgba(0,0,0,0.95);
        }

        .parallax-thumb { 
            width: 100%; height: 100%; object-fit: cover; 
            will-change: transform; pointer-events: none; 
            transform: scale(1.15);
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }
        
        .parallax-thumb.visible { opacity: 1; }

        .content { padding: 15px 16px; }
        .title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .title { font-size: 17px; font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 8px; cursor: pointer; flex-grow: 1; }
        
        .expand-btn { 
            background: #1c1c1e; border: 1px solid #333; border-radius: 50%; 
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; 
            font-size: 12px; color: #fff; cursor: pointer; flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .expand-btn.open { transform: rotate(180deg); }

        .meta { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin-top: 4px; }

        .desc-container { 
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease, margin-top 0.4s ease;
            font-size: 15px; line-height: 1.6; color: #ccc;
        }
        .desc-container.open { max-height: 2000px; margin-top: 16px; }

        /* --- UI Components --- */
        #scrollTop {
            position: fixed; bottom: calc(30px + env(safe-area-inset-bottom)); right: 20px;
            width: 44px; height: 44px; background: rgba(30, 30, 32, 0.8);
            border: 1px solid #333; border-radius: 50%; color: #fff;
            display: flex; align-items: center; justify-content: center;
            z-index: 1001; opacity: 0; visibility: hidden;
            transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        #scrollTop.visible { opacity: 1; visibility: visible; }

        .loading { text-align: center; padding: 40px 20px; font-family: 'Press Start 2P'; font-size: 7px; color: #555; line-height: 2;}
    </style>
</head>
<body id="mainBody">

<header id="mainHeader" class="at-top">
    <div class="app-title" id="logo">Gaming News</div>
    <div class="bed-mode-toggle" id="bedBtn" onclick="toggleBed()">
        <i data-lucide="moon"></i>
    </div>
</header>

<div id="ptr">PULL TO REFRESH</div>

<div id="feed-container">
    <div id="status" class="loading">SYNCING FEEDS...</div>
    <div id="feed"></div>
    <div id="loadingMore" class="loading" style="display: none; padding: 20px;">LOADING MORE...</div>
</div>

<button id="scrollTop" onclick="scrollToTop()">
    <i data-lucide="chevron-up"></i>
</button>

<script>
const feeds = [
    { url: "https://www.videogameschronicle.com/feed/", name: "VGC" },
    { url: "https://aftermath.site/feed", name: "Aftermath" },
    { url: "https://www.pcgamer.com/rss/", name: "PC Gamer" },
    { url: "https://www.eurogamer.net/feed", name: "Eurogamer" },
    { url: "https://kotaku.com/rss", name: "Kotaku" },
    { url: "https://www.polygon.com/rss/index.xml", name: "Polygon" },
    { url: "https://www.gamespot.com/feeds/mashup/", name: "GameSpot" },
    { url: "https://www.gamesindustry.biz/feed", name: "GamesIndustry" },
    { url: "https://www.rockpapershotgun.com/feed", name: "RPS" }
];

let allArticles = [];
let renderedCount = 0;
const chunkSize = 15;
let isFetching = false;
const proxy = "https://corsproxy.io/?";

// Smart Date Formatter
function formatSmartDate(dateObj) {
    const now = new Date();
    const timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    
    const isToday = dateObj.getDate() === now.getDate() && dateObj.getMonth() === now.getMonth() && dateObj.getFullYear() === now.getFullYear();
    if (isToday) return timeStr;

    const yesterday = new Date(now);
    yesterday.setDate(now.getDate() - 1);
    const isYesterday = dateObj.getDate() === yesterday.getDate() && dateObj.getMonth() === yesterday.getMonth() && dateObj.getFullYear() === yesterday.getFullYear();
    if (isYesterday) return `Yesterday • ${timeStr}`;

    const options = { month: 'short', day: 'numeric' };
    return `${dateObj.toLocaleDateString('en-US', options)} • ${timeStr}`;
}

// Safe image loader
function loadImage(url, imgElement) {
    const tempImg = new Image();
    tempImg.onload = () => {
        imgElement.src = url;
        imgElement.classList.add('visible');
    };
    tempImg.src = url;
}

async function fetchAll(isRefresh = false) {
    if (isFetching) return;
    isFetching = true;
    
    if (!isRefresh) document.getElementById("status").style.display = "block";
    
    // Reset state for refresh
    if (isRefresh) {
        allArticles = [];
        renderedCount = 0;
        document.getElementById("feed").innerHTML = "";
    }

    try {
        const fetchPromises = feeds.map(async (f) => {
            try {
                const freshUrl = f.url + (f.url.includes('?') ? '&' : '?') + '_cb=' + Date.now();
                const response = await fetch(proxy + encodeURIComponent(freshUrl), { cache: "no-store" });
                const text = await response.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                const items = xml.querySelectorAll("item, entry");
                
                items.forEach(el => {
                    const title = el.querySelector("title")?.textContent || "";
                    const link = el.querySelector("link")?.getAttribute("href") || el.querySelector("link")?.textContent || "";
                    const dateStr = el.querySelector("pubDate, published, updated")?.textContent;
                    const date = new Date(dateStr || 0);
                    
                    const desc = el.querySelector("description, summary")?.textContent || "";
                    const rawStr = new XMLSerializer().serializeToString(el);
                    let imgMatch = rawStr.match(/<media:content[^>]+url=["']([^"']+)["']/i) ||
                                   rawStr.match(/<enclosure[^>]+url=["']([^"']+)["']/i) ||
                                   rawStr.match(/<img[^>]+src=["']([^"']+)["']/i);
                    
                    if (title && link) {
                        allArticles.push({ title, link, date, source: f.name, image: imgMatch ? imgMatch[1] : null, content: desc });
                    }
                });
            } catch (e) { console.warn("Failed: " + f.name); }
        });

        await Promise.all(fetchPromises);
        
        // Ensure no duplicates on fetch and sort by newest
        allArticles = Array.from(new Set(allArticles.map(a => a.link)))
            .map(link => allArticles.find(a => a.link === link))
            .sort((a, b) => b.date - a.date);
        
        document.getElementById("status").style.display = "none";
        
        if (isRefresh || renderedCount === 0) {
            renderNextChunk();
        }
    } catch (err) {
        document.getElementById("status").innerText = "FEED TEMPORARILY UNAVAILABLE";
    } finally {
        isFetching = false;
    }
}

function renderNextChunk() {
    if (renderedCount >= allArticles.length) {
        document.getElementById("loadingMore").style.display = "none";
        return;
    }
    
    const container = document.getElementById("feed");
    const nextBatch = allArticles.slice(renderedCount, renderedCount + chunkSize);
    
    nextBatch.forEach((a) => {
        const card = document.createElement("div");
        card.className = "card";
        
        let cleanDesc = a.content.replace(/<script[^>]*>([\S\s]*?)<\/script>/gmi, '')
                                 .replace(/<iframe[^>]*>([\S\s]*?)<\/iframe>/gmi, '')
                                 .replace(/<img[^>]*>/gmi, '');

        let imgTag = "";
        if (a.image) {
            imgTag = `<div class="thumb-wrapper" onclick="window.open('${a.link}', '_blank')">
                        <img class="parallax-thumb" data-src="${a.image}">
                      </div>`;
        }

        card.innerHTML = `
            ${imgTag}
            <div class="content">
                <div class="title-row">
                    <div class="title" onclick="window.open('${a.link}', '_blank')">${a.title}</div>
                    <div class="expand-btn" onclick="toggleDesc(this)">▼</div>
                </div>
                <div class="meta">${a.source} • ${formatSmartDate(a.date)}</div>
                <div class="desc-container">${cleanDesc}</div>
            </div>
        `;
        container.appendChild(card);
    });

    const newThumbs = Array.from(container.querySelectorAll('.parallax-thumb')).slice(renderedCount);
    newThumbs.forEach(img => {
        if (img.getAttribute('data-src')) {
            loadImage(img.getAttribute('data-src'), img);
        }
    });

    renderedCount += nextBatch.length;
    
    // Show/hide the "loading more" indicator based on remaining items
    document.getElementById("loadingMore").style.display = renderedCount < allArticles.length ? "block" : "none";
    updateLayout();
}

function toggleDesc(btn) {
    btn.classList.toggle("open");
    const desc = btn.parentElement.nextElementSibling.nextElementSibling;
    desc.classList.toggle("open");
    setTimeout(updateLayout, 400); 
}

function updateLayout() {
    const scrollY = window.scrollY;
    const windowHeight = window.innerHeight;
    
    const header = document.getElementById('mainHeader');
    if (scrollY < 50) header.classList.add('at-top');
    else header.classList.remove('at-top');

    const st = document.getElementById('scrollTop');
    if (scrollY > 600) st.classList.add('visible');
    else st.classList.remove('visible');

    const thumbs = document.querySelectorAll('.parallax-thumb');
    thumbs.forEach(thumb => {
        const rect = thumb.parentElement.getBoundingClientRect();
        if (rect.top <= windowHeight && rect.bottom >= 0) {
            const centerOffset = (windowHeight / 2) - (rect.top + rect.height / 2);
            const yMove = centerOffset * 0.08; 
            thumb.style.transform = `scale(1.15) translate3d(0, ${yMove}px, 0)`;
        }
    });

    if (renderedCount < allArticles.length) {
        const cards = document.querySelectorAll('.card');
        if (cards.length >= 5) {
            const fifthFromLast = cards[cards.length - 5];
            if (fifthFromLast.getBoundingClientRect().top < windowHeight) {
                renderNextChunk();
            }
        }
    }
}

// PTR Logic
let startY = 0;
const ptr = document.getElementById("ptr");
document.addEventListener('touchstart', e => { 
    if (window.scrollY <= 0) startY = e.touches[0].clientY; 
}, {passive: true});

document.addEventListener('touchmove', e => {
    if (startY > 0 && window.scrollY <= 0) {
        let dy = e.touches[0].clientY - startY;
        if (dy > 0) {
            ptr.style.height = Math.min(dy * 0.5, 80) + 'px';
            ptr.innerText = dy > 120 ? "RELEASE TO REFRESH" : "PULL TO REFRESH";
        }
    }
}, {passive: true});

document.addEventListener('touchend', e => {
    if (startY > 0) {
        let dy = e.changedTouches[0].clientY - startY;
        if (dy > 120) {
            ptr.style.height = '40px'; 
            ptr.innerText = "REFRESHING...";
            fetchAll(true).then(() => { ptr.style.height = '0'; });
        } else {
            ptr.style.height = '0';
        }
    }
    startY = 0;
}, {passive: true});

function toggleBed() {
    const feed = document.getElementById('feed-container');
    const body = document.getElementById('mainBody');
    const btn = document.getElementById('bedBtn');
    
    feed.classList.toggle('bed-active');
    body.classList.toggle('bed-active-ui');
    
    const isBed = feed.classList.contains('bed-active');
    btn.innerHTML = isBed ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>';
    lucide.createIcons();
}

function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('scroll', updateLayout, { passive: true });
window.onload = () => {
    lucide.createIcons();
    fetchAll();
};
</script>
</body>
</html>

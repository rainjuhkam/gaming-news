<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/686/686589.png">
    <title>Gaming News</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            color-scheme: dark;
            --header-h: calc(140px + env(safe-area-inset-top)); /* Expanded Height */
        }
        
        body { margin: 0; background: #000; color: #e5e5e7; font-family: -apple-system, sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        body.scrolled { --header-h: calc(50px + env(safe-area-inset-top)); } /* Slim Height */

        /* --- Header: Locked to Variable --- */
        header { 
            position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: flex-end;
            z-index: 1000; border-bottom: 1px solid #1c1c1e;
            transition: height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 0 20px; box-sizing: border-box;
        }

        .app-title { 
            position: absolute; left: 50%; top: 50%;
            font-family: 'Press Start 2P', cursive; font-size: 14px; color: #fff; 
            text-transform: uppercase; margin: 0; letter-spacing: 2px;
            transform: translate(-50%, -50%);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Slim State Logo */
        body.scrolled .app-title { 
            left: 20px; top: 50%; transform: translate(0, -50%); font-size: 6px; 
        }
        
        .bed-mode-toggle { cursor: pointer; padding: 5px; z-index: 1001; color: #888; margin-top: env(safe-area-inset-top); }
        .lucide { width: 14px; height: 14px; stroke-width: 2.5px; }

        /* --- Feed Container: Glued to Header --- */
        #feed-container { 
            margin-top: var(--header-h); 
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
            transition: margin-top 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Pull to Refresh Hidden Overlay */
        #ptr { 
            position: absolute; width: 100%; top: 0; left: 0;
            height: 0; overflow: hidden; background: #111;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Press Start 2P', cursive; font-size: 7px; color: #444;
            z-index: 998;
        }

        .card { margin-bottom: 30px; border-bottom: 1px solid #1c1c1e; padding-bottom: 20px; }
        
        /* 3D Wrapper with Background Color to stop White Flash */
        .thumb-wrapper { 
            width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #0a0a0a; 
            position: relative; border-radius: 4px;
            box-shadow: inset 0 -50px 40px -20px rgba(0,0,0,0.95);
        }

        .parallax-thumb { 
            width: 100%; height: 100%; object-fit: cover; 
            will-change: transform; transform: scale(1.15);
            opacity: 0; transition: opacity 0.4s ease-out; /* Sharper transition */
        }
        
        .parallax-thumb.ready { opacity: 1; }

        .content { padding: 15px 16px; }
        .title { font-size: 17px; font-weight: 700; color: #fff; line-height: 1.3; }
        .meta { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 700; margin-top: 6px; }

        .loading { text-align: center; padding: 100px 20px; font-family: 'Press Start 2P', cursive; font-size: 7px; color: #444; }
    </style>
</head>
<body id="mainBody">

<div id="ptr">PULL TO REFRESH</div>

<header id="mainHeader">
    <div class="app-title">Gaming News</div>
    <div class="bed-mode-toggle" id="bedBtn" onclick="toggleBed()">
        <i data-lucide="moon"></i>
    </div>
</header>

<div id="feed-container">
    <div id="status" class="loading">BYPASSING CACHE...</div>
    <div id="feed"></div>
    <div id="loadingMore" class="loading" style="display: none;">LOADING MORE...</div>
</div>

<script>
const feeds = [
    { url: "https://www.videogameschronicle.com/feed/", name: "VGC" },
    { url: "https://aftermath.site/feed", name: "Aftermath" },
    { url: "https://www.pcgamer.com/rss/", name: "PC Gamer" },
    { url: "https://www.eurogamer.net/feed", name: "Eurogamer" },
    { url: "https://kotaku.com/rss", name: "Kotaku" },
    { url: "https://www.polygon.com/rss/index.xml", name: "Polygon" },
    { url: "https://www.gamespot.com/feeds/mashup/", name: "GameSpot" }
];

let allArticles = [];
let renderedCount = 0;
const chunkSize = 15;
let isFetching = false;

// Aggressive Cache Bypass Proxy
const proxy = "https://api.allorigins.win/raw?url=";

async function fetchAll(isRefresh = false) {
    if (isFetching) return;
    isFetching = true;
    if (!isRefresh) document.getElementById("status").style.display = "block";

    try {
        const fetchPromises = feeds.map(async (f) => {
            try {
                // Triple-bypass: unique query, different proxy, and cache headers
                const bust = encodeURIComponent(f.url + "?t=" + Date.now());
                const response = await fetch(proxy + bust, { cache: "no-store", headers: {'pragma': 'no-cache', 'cache-control': 'no-cache'} });
                const text = await response.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                const items = xml.querySelectorAll("item, entry");
                
                items.forEach(el => {
                    const title = el.querySelector("title")?.textContent || "";
                    const link = el.querySelector("link")?.getAttribute("href") || el.querySelector("link")?.textContent || "";
                    const date = new Date(el.querySelector("pubDate, published, updated")?.textContent || 0);
                    const rawStr = new XMLSerializer().serializeToString(el);
                    let imgMatch = rawStr.match(/<media:content[^>]+url=["']([^"']+)["']/i) ||
                                   rawStr.match(/<enclosure[^>]+url=["']([^"']+)["']/i) ||
                                   rawStr.match(/<img[^>]+src=["']([^"']+)["']/i);
                    
                    if (title && link) allArticles.push({ title, link, date, source: f.name, image: imgMatch ? imgMatch[1] : null });
                });
            } catch (e) { console.warn("Feed error"); }
        });

        await Promise.all(fetchPromises);
        
        // Final Sort: Ensure newest is strictly at the top
        allArticles = Array.from(new Map(allArticles.map(a => [a.link, a])).values());
        allArticles.sort((a, b) => b.date - a.date);
        
        document.getElementById("status").style.display = "none";
        if (isRefresh) { renderedCount = 0; document.getElementById("feed").innerHTML = ""; }
        renderNextChunk();
    } finally { isFetching = false; }
}

function renderNextChunk() {
    const container = document.getElementById("feed");
    const nextBatch = allArticles.slice(renderedCount, renderedCount + chunkSize);
    
    nextBatch.forEach((a) => {
        const card = document.createElement("div");
        card.className = "card";
        const imgHtml = a.image ? `<div class="thumb-wrapper" onclick="window.open('${a.link}', '_blank')"><img class="parallax-thumb" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" data-src="${a.image}"></div>` : "";
        
        card.innerHTML = `${imgHtml}<div class="content"><div class="title" onclick="window.open('${a.link}', '_blank')">${a.title}</div><div class="meta">${a.source} • ${formatDate(a.date)}</div></div>`;
        container.appendChild(card);
    });

    // Image loading with pre-load background
    const newThumbs = Array.from(container.querySelectorAll('.parallax-thumb')).slice(renderedCount);
    newThumbs.forEach(img => {
        const actualUrl = img.getAttribute('data-src');
        const temp = new Image();
        temp.onload = () => {
            img.src = actualUrl;
            img.classList.add('ready');
        };
        temp.src = actualUrl;
    });

    renderedCount += nextBatch.length;
}

function formatDate(d) {
    return d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

function updateScroll() {
    const sy = window.scrollY;
    if (sy > 50) document.body.classList.add('scrolled');
    else document.body.classList.remove('scrolled');

    document.querySelectorAll('.parallax-thumb.ready').forEach(thumb => {
        const rect = thumb.parentElement.getBoundingClientRect();
        if (rect.top <= window.innerHeight && rect.bottom >= 0) {
            const offset = (window.innerHeight / 2) - (rect.top + rect.height / 2);
            thumb.style.transform = `scale(1.15) translate3d(0, ${offset * 0.08}px, 0)`;
        }
    });

    if (!isFetching && renderedCount < allArticles.length) {
        if ((window.innerHeight + sy) >= document.body.offsetHeight - 1000) renderNextChunk();
    }
}

// Fixed PTR Logic
let startY = 0;
const ptr = document.getElementById("ptr");
document.addEventListener('touchstart', e => { if (window.scrollY <= 0) startY = e.touches[0].clientY; }, {passive: true});
document.addEventListener('touchmove', e => {
    if (startY > 0 && window.scrollY <= 0) {
        let dy = e.touches[0].clientY - startY;
        if (dy > 0) {
            ptr.style.height = Math.min(dy * 0.4, 60) + 'px';
        }
    }
}, {passive: true});
document.addEventListener('touchend', e => {
    if (startY > 0 && (e.changedTouches[0].clientY - startY) > 100) {
        ptr.style.height = '40px'; ptr.innerText = "REFRESHING...";
        fetchAll(true).then(() => { ptr.style.height = '0'; ptr.innerText = "PULL TO REFRESH"; });
    } else ptr.style.height = '0';
    startY = 0;
}, {passive: true});

function toggleBed() {
    document.getElementById('feed-container').classList.toggle('bed-active');
    lucide.createIcons();
}

window.addEventListener('scroll', updateScroll, { passive: true });
window.onload = () => { lucide.createIcons(); fetchAll(); };
</script>
</body>
</html>

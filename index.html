<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gaming News">
    
    <title>Gaming News</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root { color-scheme: dark; }
        body { 
            margin: 0; background: #000; color: #e5e5e7; 
            font-family: -apple-system, system-ui, sans-serif; 
            overflow-x: hidden; transition: opacity 0.3s ease;
        }

        /* Fixed Stealth Header */
        header { 
            position: fixed; top: 0; left: 0; right: 0;
            height: calc(45px + env(safe-area-inset-top));
            background: rgba(0,0,0,0.95);
            display: flex; align-items: flex-end; justify-content: space-between;
            padding: 0 20px 12px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .app-title { font-family: 'Press Start 2P', cursive; font-size: 11px; color: #fff; text-transform: uppercase; margin: 0; }
        .bed-mode-toggle { font-size: 22px; cursor: pointer; user-select: none; }

        #feed-container { padding-top: calc(70px + env(safe-area-inset-top)); }

        .card { margin-bottom: 24px; cursor: pointer; border-bottom: 1px solid #1c1c1e; padding-bottom: 16px; }
        .thumb-wrapper { width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #111; display: block; }
        .parallax-thumb { width: 100%; height: 100%; object-fit: cover; transform: scale(1.15); will-change: transform; }

        .content { padding: 14px; }
        .title { font-size: 16px; font-weight: 600; color: #fff; line-height: 1.3; }
        .meta { font-size: 12px; color: #9a9a9c; margin-top: 6px; font-weight: 500; }

        #reader { display: none; padding: calc(20px + env(safe-area-inset-top)) 16px 150px; min-height: 100vh; background: #000; }
        .articlePage { max-width: 42em; margin: 0 auto; }
        .articlePage img { width: 100%; border-radius: 12px; margin-bottom: 20px; }
        .articlePage h2 { font-size: 24px; color: #fff; line-height: 1.2; margin-bottom: 20px; }
        .articlePage p { font-size: 19px; line-height: 1.7; color: #d1d1d6; margin-bottom: 1.3em; }

        .button {
            position: fixed; left: 20px; right: 20px; padding: 18px; font-size: 16px; 
            border-radius: 14px; border: 1px solid #2c2c2e; background: #1c1c1e; color: #fff;
            font-weight: 600; text-align: center; z-index: 1001;
        }
        #openSafari { bottom: calc(20px + env(safe-area-inset-bottom) + 75px); background: #0a84ff; border: none; }
        #backBtn { bottom: calc(20px + env(safe-area-inset-bottom) + 10px); }

        .bed-active { opacity: 0.4; }
        .loading { text-align: center; padding: 50px; font-family: 'Press Start 2P'; font-size: 10px; }
    </style>
</head>
<body>

<header id="mainHeader">
    <div class="app-title">GAMING NEWS</div>
    <div class="bed-mode-toggle" id="bedBtn" onclick="toggleBed()">🌙</div>
</header>

<div id="feed-container">
    <div id="loading" class="loading">FETCHING DATA...</div>
    <div id="feed"></div>
</div>

<div id="reader">
    <div class="articlePage" id="articleContent"></div>
    <button class="button" id="openSafari" onclick="openSafari()">Open in Safari</button>
    <button class="button" id="backBtn" onclick="back()">⬅︎ Back</button>
</div>

<script>
const feeds = [
    { url: "https://www.videogameschronicle.com/feed/", name: "VGC" },
    { url: "https://aftermath.site/feed", name: "Aftermath" },
    { url: "https://www.pcgamer.com/rss/", name: "PC Gamer" },
    { url: "https://www.eurogamer.net/feed", name: "Eurogamer" },
    { url: "https://kotaku.com/rss", name: "Kotaku" },
    { url: "https://www.polygon.com/rss/index.xml", name: "Polygon" },
    { url: "https://www.gamespot.com/feeds/mashup/", name: "GameSpot" },
    { url: "https://www.gamesindustry.biz/feed", name: "GamesIndustry.biz" },
    { url: "https://www.rockpapershotgun.com/feed", name: "Rock Paper Shotgun" }
];

let allArticles = [];
let scrollPos = 0;
let currentIndex = null;

// CORS Proxy to bypass browser restrictions
const proxy = "https://api.allorigins.win/get?url=";

async function fetchAll() {
    const promises = feeds.map(async (f) => {
        try {
            const res = await fetch(proxy + encodeURIComponent(f.url));
            const data = await res.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = xml.querySelectorAll("item");
            
            items.forEach(item => {
                const date = new Date(item.querySelector("pubDate")?.textContent || 0);
                if (Date.now() - date.getTime() < 4 * 24 * 60 * 60 * 1000) {
                    const content = item.querySelector("description")?.textContent || "";
                    const imgMatch = content.match(/<img[^>]+src="([^">]+)"/);
                    
                    allArticles.push({
                        title: item.querySelector("title")?.textContent,
                        link: item.querySelector("link")?.textContent,
                        date: date,
                        source: f.name,
                        image: imgMatch ? imgMatch[1] : null,
                        content: content
                    });
                }
            });
        } catch (e) { console.error("Failed:", f.name); }
    });

    await Promise.all(promises);
    allArticles.sort((a, b) => b.date - a.date);
    document.getElementById("loading").style.display = "none";
    render();
}

function render() {
    const feed = document.getElementById("feed");
    allArticles.forEach((a, i) => {
        const card = document.createElement("div");
        card.className = "card";
        const img = a.image ? `<div class="thumb-wrapper"><img src="${a.image}" class="parallax-thumb"></div>` : "";
        card.innerHTML = `${img}<div class="content"><div class="title">${a.title}</div><div class="meta">${a.source}</div></div>`;
        card.onclick = () => openArticle(i);
        feed.appendChild(card);
    });
}

function openArticle(i) {
    currentIndex = i;
    scrollPos = window.scrollY;
    document.getElementById("feed-container").style.display = "none";
    document.getElementById("mainHeader").style.display = "none";
    document.getElementById("reader").style.display = "block";
    const a = allArticles[i];
    document.getElementById("articleContent").innerHTML = `<h2>${a.title}</h2>${a.content}`;
    window.scrollTo(0, 0);
}

function back() {
    document.getElementById("reader").style.display = "none";
    document.getElementById("feed-container").style.display = "block";
    document.getElementById("mainHeader").style.display = "flex";
    window.scrollTo(0, scrollPos);
}

function openSafari() {
    window.open(allArticles[currentIndex].link, '_blank');
}

function toggleBed() {
    document.body.classList.toggle('bed-active');
    document.getElementById('bedBtn').innerText = document.body.classList.contains('bed-active') ? "☀️" : "🌙";
}

// Swipe Back
let startX;
document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
document.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientX - startX > 100 && document.getElementById("reader").style.display === "block") back();
});

fetchAll();
</script>
</body>
</html>

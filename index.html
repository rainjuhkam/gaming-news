<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/686/686589.png">
    <title>Gaming News</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { color-scheme: dark; }
        body { margin: 0; background: #000; color: #e5e5e7; font-family: -apple-system, sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        header { 
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: flex-end;
            z-index: 1000; border-bottom: 1px solid #1c1c1e;
            transition: padding 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px;
        }

        header.at-top { padding: calc(65px + env(safe-area-inset-top)) 20px 65px; }

        .app-title { 
            position: absolute;
            font-family: 'Press Start 2P', cursive; font-size: 5px; color: #fff; 
            text-transform: uppercase; margin: 0; line-height: 1; letter-spacing: 2px;
            transform-origin: center center;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        header.at-top .app-title { left: 50%; transform: translateX(-50%) scale(2.8); }
        header:not(.at-top) .app-title { left: 20px; transform: translateX(0) scale(1.2); }
        
        .bed-mode-toggle { cursor: pointer; padding: 5px; z-index: 1001; color: #888; }
        .lucide { width: 14px; height: 14px; stroke-width: 2.5px; }

        /* PTR Container - Adjusted to sit perfectly behind header */
        #ptr { 
            height: 0; overflow: hidden; text-align: center; 
            background: #000; color: #555; font-family: 'Press Start 2P', cursive; 
            font-size: 7px; display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 999;
            margin-top: calc(144px + env(safe-area-inset-top)); 
        }

        #feed-container { 
            margin-top: calc(144px + env(safe-area-inset-top)); 
            padding-bottom: calc(80px + env(safe-area-inset-bottom)); 
        }
        /* Remove margin-top when header is slim */
        body.scrolled #ptr, body.scrolled #feed-container { 
            margin-top: calc(44px + env(safe-area-inset-top)); 
        }

        .card { margin-bottom: 30px; border-bottom: 1px solid #1c1c1e; padding-bottom: 20px; }
        
        .thumb-wrapper { 
            width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #0a0a0a; 
            position: relative; border-radius: 4px;
            box-shadow: inset 0 -50px 40px -20px rgba(0,0,0,0.95);
        }

        .parallax-thumb { 
            width: 100%; height: 100%; object-fit: cover; 
            will-change: transform; transform: scale(1.15);
            opacity: 0; transition: opacity 0.5s ease-in;
        }
        
        .parallax-thumb.ready { opacity: 1; }

        .content { padding: 15px 16px; }
        .title-row { display: flex; justify-content: space-between; gap: 12px; }
        .title { font-size: 17px; font-weight: 700; color: #fff; line-height: 1.3; flex-grow: 1; }
        
        .meta { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 700; margin-top: 4px; }

        #scrollTop {
            position: fixed; bottom: calc(30px + env(safe-area-inset-bottom)); right: 20px;
            width: 44px; height: 44px; background: rgba(30, 30, 32, 0.8);
            border: 1px solid #333; border-radius: 50%; color: #fff;
            display: flex; align-items: center; justify-content: center;
            z-index: 1001; opacity: 0; visibility: hidden; transition: 0.3s;
        }
        #scrollTop.visible { opacity: 1; visibility: visible; }

        .loading { text-align: center; padding: 40px 20px; font-family: 'Press Start 2P'; font-size: 7px; color: #444; }
    </style>
</head>
<body id="mainBody">

<header id="mainHeader" class="at-top">
    <div class="app-title">Gaming News</div>
    <div class="bed-mode-toggle" id="bedBtn" onclick="toggleBed()">
        <i data-lucide="moon"></i>
    </div>
</header>

<div id="ptr">PULL TO REFRESH</div>

<div id="feed-container">
    <div id="status" class="loading">SYNCING LATEST UPDATES...</div>
    <div id="feed"></div>
    <div id="loadingMore" class="loading" style="display: none;">LOADING OLDER NEWS...</div>
</div>

<button id="scrollTop" onclick="scrollToTop()"><i data-lucide="chevron-up"></i></button>

<script>
const feeds = [
    { url: "https://www.videogameschronicle.com/feed/", name: "VGC" },
    { url: "https://aftermath.site/feed", name: "Aftermath" },
    { url: "https://www.pcgamer.com/rss/", name: "PC Gamer" },
    { url: "https://www.eurogamer.net/feed", name: "Eurogamer" },
    { url: "https://kotaku.com/rss", name: "Kotaku" },
    { url: "https://www.polygon.com/rss/index.xml", name: "Polygon" },
    { url: "https://www.gamespot.com/feeds/mashup/", name: "GameSpot" },
    { url: "https://www.gamesindustry.biz/feed", name: "GamesIndustry" }
];

let allArticles = [];
let renderedCount = 0;
const chunkSize = 15;
let isFetching = false;
const proxy = "https://corsproxy.io/?";

function formatSmartDate(dateObj) {
    const now = new Date();
    const timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const isToday = dateObj.toDateString() === now.toDateString();
    if (isToday) return timeStr;
    
    const yesterday = new Date(); yesterday.setDate(now.getDate() - 1);
    if (dateObj.toDateString() === yesterday.toDateString()) return `Yesterday • ${timeStr}`;
    
    return `${dateObj.toLocaleDateString('en-US', {month:'short', day:'numeric'})} • ${timeStr}`;
}

// Ultra-smooth image reveal using .decode()
async function smartLoadImage(url, imgElement) {
    const tempImg = new Image();
    tempImg.src = url;
    try {
        await tempImg.decode(); // Ensures image is fully uncompressed in GPU memory
        imgElement.src = url;
        imgElement.classList.add('ready');
    } catch (e) {
        imgElement.parentElement.style.display = 'none';
    }
}

async function fetchAll(isRefresh = false) {
    if (isFetching) return;
    isFetching = true;
    if (!isRefresh) document.getElementById("status").style.display = "block";

    try {
        const fetchPromises = feeds.map(async (f) => {
            // Force proxy to bypass cache with unique timestamp
            const nocacheUrl = `${f.url}${f.url.includes('?') ? '&' : '?'}v=${Date.now()}`;
            const response = await fetch(proxy + encodeURIComponent(nocacheUrl), { cache: 'reload' });
            const text = await response.text();
            const xml = new DOMParser().parseFromString(text, "text/xml");
            const items = xml.querySelectorAll("item, entry");
            
            items.forEach(el => {
                const title = el.querySelector("title")?.textContent || "";
                const link = el.querySelector("link")?.getAttribute("href") || el.querySelector("link")?.textContent || "";
                const date = new Date(el.querySelector("pubDate, published, updated")?.textContent || 0);
                const rawStr = new XMLSerializer().serializeToString(el);
                let imgMatch = rawStr.match(/<media:content[^>]+url=["']([^"']+)["']/i) ||
                               rawStr.match(/<enclosure[^>]+url=["']([^"']+)["']/i) ||
                               rawStr.match(/<img[^>]+src=["']([^"']+)["']/i);
                
                if (title && link) allArticles.push({ title, link, date, source: f.name, image: imgMatch ? imgMatch[1] : null });
            });
        });

        await Promise.all(fetchPromises);
        allArticles = Array.from(new Map(allArticles.map(a => [a.link, a])).values()); // Unique
        allArticles.sort((a, b) => b.date - a.date);
        
        document.getElementById("status").style.display = "none";
        if (isRefresh) { renderedCount = 0; document.getElementById("feed").innerHTML = ""; }
        renderNextChunk();
    } finally { isFetching = false; }
}

function renderNextChunk() {
    const container = document.getElementById("feed");
    const nextBatch = allArticles.slice(renderedCount, renderedCount + chunkSize);
    
    nextBatch.forEach((a) => {
        const card = document.createElement("div");
        card.className = "card";
        const imgHtml = a.image ? `<div class="thumb-wrapper" onclick="window.open('${a.link}', '_blank')"><img class="parallax-thumb" data-src="${a.image}"></div>` : "";
        
        card.innerHTML = `${imgHtml}<div class="content"><div class="title-row"><div class="title" onclick="window.open('${a.link}', '_blank')">${a.title}</div></div><div class="meta">${a.source} • ${formatSmartDate(a.date)}</div></div>`;
        container.appendChild(card);
    });

    const newThumbs = Array.from(container.querySelectorAll('.parallax-thumb')).slice(renderedCount);
    newThumbs.forEach(img => smartLoadImage(img.getAttribute('data-src'), img));

    renderedCount += nextBatch.length;
    document.getElementById("loadingMore").style.display = renderedCount < allArticles.length ? "block" : "none";
}

function updateLayout() {
    const sy = window.scrollY;
    const wh = window.innerHeight;
    
    if (sy < 40) {
        document.getElementById('mainHeader').classList.add('at-top');
        document.body.classList.remove('scrolled');
    } else {
        document.getElementById('mainHeader').classList.remove('at-top');
        document.body.classList.add('scrolled');
    }

    if (sy > 600) document.getElementById('scrollTop').classList.add('visible');
    else document.getElementById('scrollTop').classList.remove('visible');

    document.querySelectorAll('.parallax-thumb.ready').forEach(thumb => {
        const rect = thumb.parentElement.getBoundingClientRect();
        if (rect.top <= wh && rect.bottom >= 0) {
            const offset = (wh / 2) - (rect.top + rect.height / 2);
            thumb.style.transform = `scale(1.15) translate3d(0, ${offset * 0.08}px, 0)`;
        }
    });

    if (!isFetching && renderedCount < allArticles.length) {
        const lastCard = document.querySelector('.card:nth-last-child(5)');
        if (lastCard && lastCard.getBoundingClientRect().top < wh) renderNextChunk();
    }
}

// PTR Logic
let startY = 0;
const ptr = document.getElementById("ptr");
document.addEventListener('touchstart', e => { if (window.scrollY <= 0) startY = e.touches[0].clientY; }, {passive: true});
document.addEventListener('touchmove', e => {
    if (startY > 0 && window.scrollY <= 0) {
        let dy = e.touches[0].clientY - startY;
        if (dy > 0) {
            ptr.style.height = Math.min(dy * 0.4, 60) + 'px';
            ptr.innerText = dy > 100 ? "RELEASE" : "PULL";
        }
    }
}, {passive: true});
document.addEventListener('touchend', e => {
    if (startY > 0 && (e.changedTouches[0].clientY - startY) > 100) {
        ptr.style.height = '40px'; ptr.innerText = "FETCHING...";
        fetchAll(true).then(() => ptr.style.height = '0');
    } else ptr.style.height = '0';
    startY = 0;
}, {passive: true});

function toggleBed() {
    document.getElementById('feed-container').classList.toggle('bed-active');
    const isBed = document.getElementById('feed-container').classList.contains('bed-active');
    document.getElementById('bedBtn').innerHTML = isBed ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>';
    lucide.createIcons();
}

function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

window.addEventListener('scroll', updateLayout, { passive: true });
window.onload = () => { lucide.createIcons(); fetchAll(); };
</script>
</body>
</html>
